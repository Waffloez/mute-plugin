# Mute - mute reason definitions
#
# Add your own! Each entry has:
#   display:  text shown in the mute reason and chat messages
#   duration: mute length in LiteBans format (e.g. 30d, 7d, 24h, 2h, 30m),
#             or "perm" for a permanent mute
#
# The key is what you type: /mute <player> <key>
reasons:
  spam:
    display: "Spam"
    duration: "1d"
  toxicity:
    display: "Toxicity/Insults"
    duration: "3d"
  advertising:
    display: "Advertising"
    duration: "7d"
  racism:
    display: "Racism"
    duration: "10d"
  homophobia:
    display: "Homophobia/Discrimination"
    duration: "10d"
  caps:
    display: "Excessive Caps"
    duration: "1h"
  flooding:
    display: "Chat Flooding"
    duration: "6h"
  swearing:
    display: "Excessive Swearing"
    duration: "12h"
  harassment:
    display: "Harassment"
    duration: "5d"
  threats:
    display: "Threats"
    duration: "14d"
  doxxing:
    display: "Doxxing"
    duration: "30d"
  scamming:
    display: "Scamming"
    duration: "14d"
  impersonation:
    display: "Impersonating Staff"
    duration: "7d"
  politics:
    display: "Political Arguments"
    duration: "1d"
  nsfw:
    display: "NSFW Content"
    duration: "7d"

voicechat:
  enabled: true
  permission-node: "voicechat.speak"

use-litebans: true
